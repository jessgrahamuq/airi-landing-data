name: sync
on:
  schedule:
    # Daily at 06:00 UTC (~16:30 Adelaide ACDT)
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Allow manual trigger from the Actions tab
  push:
    # Also run on script changes so PRs can preview their data output
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/sync.yml"
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt
      - name: Install deps
        run: pip install -r scripts/requirements.txt
      - name: Build incidents dataset
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
        run: python scripts/build_incidents.py
      - name: Build governance dataset
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
        run: python scripts/build_governance.py
      - name: Build mitigations dataset
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
        run: python scripts/build_mitigations.py
      - name: Build delphi dataset
        run: python scripts/build_delphi.py
      # Future datasets: add additional `- name: Build <dataset>` steps here.
      # Each step should be independent so one failing dataset doesn't block
      # the others.
      - name: Commit changes
        run: |
          git config user.name "airi-data-bot"
          git config user.email "airi-data-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): scheduled sync $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
